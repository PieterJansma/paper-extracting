rt_year`: Return an integer year only when explicitly tied to the resource start. Return an integer only when explicitly stated. If not explicit -> null. Source: Resources.start year\n- `end_year`: Return an integer year only when explicitly tied to the resource end. Return an integer only when explicitly stated. If not explicit -> null. Source: Resources.end year\n- `contact_email`: Only if explicitly shown. Use the explicit value from the PDF only. If not explicit -> null. Source: Resources.contact email\n- `issued`: Only if explicitly stated as resource metadata, not article publication date. Return the explicit date or datetime string from the PDF. Do not infer. If not explicit -> null. Source: Resources.issued\n- `modified`: Only if explicitly stated as resource metadata, not article publication date. Return the explicit date or datetime string from the PDF. Do not infer. If not explicit -> null. Source: Resources.modified\n- `logo`: Auto-added from the current schema. Use the explicit value from the PDF only. If not explicit -> null. Source: Resources.logo"


[llm]
base_url = "http://127.0.0.1:8080/v1"
model    = "numind/NuExtract-2.0-8B"
api_key  = "sk-local"
use_grammar = false
prompt_cache = true
sticky_session = true
max_tokens = 8000
timeout = 900
temperature = 0.0
chunking_enabled = false
long_text_threshold_chars = 62000
chunk_size_chars = 31000
chunk_overlap_chars = 4000

[pdf]
path = "data/concrete.pdf"
# 0 = read all pages
max_pages = 0

# Prompt/templates moved to prompts.toml.
# Override paths with:
#   PDF_EXTRACT_CONFIG=/path/to/config.toml
#   PDF_EXTRACT_PROMPTS=/path/to/prompts.toml

